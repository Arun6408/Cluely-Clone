

services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile
    image: cluely-builder
    volumes:
      # Mount the local directory into the container to export the compiled binaries back to the host system.
      # We ignore node_modules and target via .dockerignore, but the volume mount overwrites it
      # so it's a good practice to mount a specific output directory if needed, or simply map the whole workspace.
      - .:/app
      # Cache cargo registry for much faster subsequent builds
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git

volumes:
  cargo_cache:
  cargo_git:
